# Enterprise-grade GitHub Actions CI/CD Workflow for Python Application
# Follows: YAML Coding Standards and SAST Security Guidelines

name: python-ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Code quality and security scanning job
  lint:
    name: lint and security check
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit safety

      - name: run flake8 linting
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: run bandit security scan
        run: |
          bandit -r src --format json --output bandit-report.json
          bandit -r src --format txt
        continue-on-error: true

      - name: scan dependencies for vulnerabilities
        run: |
          safety check --json --output safety-report.json || true
          safety check

      - name: upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  # Build and test job with coverage
  build-and-test:
    name: build and test with coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: run tests with coverage
        run: |
          pytest --cov=src --cov-report=xml --cov-report=html --cov-report=term-missing
        continue-on-error: false

      - name: upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            htmlcov/
            coverage.xml

      - name: comment coverage on pull request
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 70
          MINIMUM_ORANGE: 50

  # Advanced SAST security scanning with CodeQL
  codeql-analysis:
    name: codeql security analysis
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      security-events: write
      actions: read

    strategy:
      fail-fast: false
      matrix:
        language: ["python"]

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: initialize codeql
        uses: github/codeql-action/init@v2
        with:
          languages: ${{ matrix.language }}
          # queries: security-and-quality

      - name: autobuild
        uses: github/codeql-action/autobuild@v2

      - name: perform codeql analysis
        uses: github/codeql-action/analyze@v2
        with:
          category: "/language:${{ matrix.language }}"

  # Dependency vulnerability scanning
  dependency-check:
    name: dependency vulnerability scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: run pip-audit
        run: |
          pip install pip-audit
          pip-audit --desc || true

  # Final validation job
  validate:
    name: validate and summarize
    runs-on: ubuntu-latest
    needs: [build-and-test, codeql-analysis, dependency-check]
    if: always()
    steps:
      - name: check job statuses
        run: |
          if [ "${{ needs.build-and-test.result }}" != "success" ]; then
            echo "Build and test job failed"
            exit 1
          fi
          if [ "${{ needs.codeql-analysis.result }}" != "success" ]; then
            echo "CodeQL analysis failed"
            exit 1
          fi
          echo "All validation checks passed!"

      - name: workflow summary
        run: |
          echo "## Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✓ Code Quality (flake8)" >> $GITHUB_STEP_SUMMARY
          echo "✓ Security Scanning (bandit, CodeQL)" >> $GITHUB_STEP_SUMMARY
          echo "✓ Dependency Scanning (safety, pip-audit)" >> $GITHUB_STEP_SUMMARY
          echo "✓ Test Coverage (pytest)" >> $GITHUB_STEP_SUMMARY
          echo "✓ All checks completed successfully!" >> $GITHUB_STEP_SUMMARY
